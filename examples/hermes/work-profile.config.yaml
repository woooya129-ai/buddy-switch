# Minimal work profile example.

model:
  provider: custom
  # Copy an exact name from `ollama list`, for example: gemma4:31b
  default: "__WORK_MODEL_NAME__"
  base_url: "http://127.0.0.1:11434/v1"

generation:
  max_tokens: 4096
  temperature: 0.7
  top_p: 0.8
  top_k: 20

quick_commands:
  friend:
    type: exec
    command: "$HOME/.local/bin/buddy-switch-friend"
  work:
    type: exec
    command: "$HOME/.local/bin/buddy-switch-work"

# Enable the toolsets you trust for work mode in your own Hermes config.
