# Buddy Switch example config.
# Copy the relevant blocks into your Hermes profile configs and replace names.

quick_commands:
  friends:
    type: exec
    command: "$HOME/.local/bin/buddy-switch-routes"
    category: catalog
    label: "Choose a friend"
    description: "Show the current profile, personality, model, and routes"
  friend:
    type: exec
    command: "$HOME/.local/bin/buddy-switch-friend"
    category: route
    label: "Friend"
    description: "Switch to the light chat profile"
    profile: buddy-friend
    model: "__FRIEND_MODEL_NAME__"
    personality: "__FRIEND_PERSONA_NAME__"
  work:
    type: exec
    command: "$HOME/.local/bin/buddy-switch-work"
    category: route
    label: "Work"
    description: "Switch to the tool-enabled work profile"
    profile: buddy-work
    model: "__WORK_MODEL_NAME__"
    personality: "__WORK_PERSONA_NAME__"

# Future upstream-friendly shape. These aliases should become config, not
# hard-coded commands.
profile_aliases:
  friend: buddy-friend
  work: buddy-work

# Future named route presets. These names are examples and are illustrative
# until Hermes supports handle-style routing.
route_presets:
  mika:
    handle: "@mika"
    profile: buddy-friend
    model: fixed
    persona: personas/moe-rose.md
  forge:
    handle: "@forge"
    profile: buddy-work
    model: "__WORK_MODEL_NAME__"
    persona: fixed
  mika_forge:
    handle: "@mika-forge"
    profile: buddy-work
    model: "__WORK_MODEL_NAME__"
    persona: personas/moe-rose.md

# Future Telegram routing shape. This is illustrative until Hermes supports it.
telegram:
  channel_profiles:
    "__TELEGRAM_CHAT_ID_FRIEND__": "buddy-friend"
    "__TELEGRAM_CHAT_ID_WORK__": "buddy-work"
  handle_routes:
    enabled: true
    inline_call: true
    sticky_binding_command: "/profile"

# Platform-agnostic shape discussed in Hermes issues.
gateway:
  profile_routes:
    - platform: telegram
      chat_id: "__TELEGRAM_CHAT_ID__"
      profile: buddy-friend
    - platform: telegram
      chat_id: "__TELEGRAM_GROUP_ID__"
      thread_id: "__TELEGRAM_THREAD_ID__"
      profile: buddy-work
